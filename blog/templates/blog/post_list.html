{% extends 'blog/base.html' %}

{% block content %}
    <h1>Все посты</h1>
    
    {% for post in posts %}
        <div>
            <h2><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></h2>
            <p>{{ post.created_at }}</p>
            <p>Комментариев: {{ post.comments.count }}</p>
        </div>
        <hr>
    {% empty %}
        <p>Постов пока нет</p>
    {% endfor %}
{% endblock %}
